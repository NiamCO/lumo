<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lumo Mail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    :root {
      --mail-1: #3b82f6;
      --mail-2: #60a5fa;
      --mail-glow: rgba(59,130,246,0.2);
    }

    .mail-app { display: flex; height: 100vh; position: relative; z-index: 10; }

    /* ── Sidebar ── */
    .mail-sidebar {
      width: 220px; flex-shrink: 0;
      display: flex; flex-direction: column;
      border-right: 1px solid var(--glass-border);
      background: var(--glass-bg-strong);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
    }
    .mail-sidebar-top {
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--glass-border);
      display: flex; align-items: center; gap: 10px;
    }
    .mail-logo-mark {
      width: 28px; height: 28px; border-radius: 8px;
      background: linear-gradient(135deg, var(--mail-1), var(--mail-2));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 10px var(--mail-glow); flex-shrink: 0;
    }
    .mail-logo-mark svg { width: 15px; height: 15px; color: white; }
    .mail-wordmark {
      font-size: 1rem; font-weight: 700; letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--mail-1), var(--mail-2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .compose-btn {
      margin: 10px 12px 6px;
      display: flex; align-items: center; gap: 8px;
      padding: 9px 14px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, var(--mail-1), var(--mail-2));
      color: white; font-family: var(--font-main); font-size: 0.85rem; font-weight: 600;
      cursor: pointer; box-shadow: 0 2px 12px var(--mail-glow);
      transition: transform 0.15s, opacity 0.15s;
    }
    .compose-btn:hover { transform: translateY(-1px); }
    .compose-btn svg { width: 14px; height: 14px; }

    .mail-nav { flex: 1; overflow-y: auto; padding: 4px 8px; }
    .mail-nav::-webkit-scrollbar { width: 3px; }
    .mail-nav::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 99px; }
    .nav-item {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 10px; border-radius: 10px; cursor: pointer;
      font-size: 0.84rem; color: var(--text-muted);
      transition: background 0.15s, color 0.15s; margin-bottom: 1px;
      border: none; background: none; font-family: var(--font-main); width: 100%; text-align: left;
    }
    .nav-item:hover { background: var(--glass-bg); color: var(--text); }
    .nav-item.active { background: var(--glass-bg-hover); color: var(--mail-1); font-weight: 500; }
    .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }
    .nav-badge {
      margin-left: auto; background: var(--mail-1); color: white;
      font-size: 0.68rem; font-weight: 700; padding: 1px 6px;
      border-radius: 999px; min-width: 18px; text-align: center;
    }

    .mail-sidebar-bottom {
      padding: 10px 12px; border-top: 1px solid var(--glass-border);
      display: flex; align-items: center; gap: 8px;
    }
    .mail-user-av {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, var(--mail-1), var(--mail-2));
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem; font-weight: 700; color: white; flex-shrink: 0;
    }
    .mail-user-email { font-size: 0.75rem; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Main ── */
    .mail-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    /* Top bar */
    .mail-topbar {
      height: 52px; flex-shrink: 0;
      display: flex; align-items: center; gap: 10px; padding: 0 16px;
      border-bottom: 1px solid var(--glass-border);
      background: var(--glass-bg-strong); backdrop-filter: var(--glass-blur);
    }
    .mail-search-wrap {
      flex: 1; max-width: 480px;
      display: flex; align-items: center; gap: 8px;
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: 10px; padding: 6px 12px; transition: border-color 0.2s;
    }
    .mail-search-wrap:focus-within { border-color: rgba(59,130,246,0.4); }
    .mail-search-wrap svg { width: 14px; height: 14px; color: var(--text-muted); flex-shrink: 0; }
    #mailSearch {
      flex: 1; border: none; background: none; outline: none;
      font-family: var(--font-main); font-size: 0.85rem; color: var(--text);
    }
    #mailSearch::placeholder { color: var(--text-muted); }
    .topbar-spacer { flex: 1; }
    .topbar-btn {
      width: 32px; height: 32px; border-radius: 9px;
      border: 1px solid var(--glass-border); background: var(--glass-bg);
      color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s; text-decoration: none;
    }
    .topbar-btn:hover { background: var(--glass-bg-hover); color: var(--text); }
    .topbar-btn svg { width: 15px; height: 15px; }

    /* ── Email list ── */
    .mail-content { flex: 1; display: flex; min-height: 0; }
    .email-list {
      width: 360px; flex-shrink: 0; border-right: 1px solid var(--glass-border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .email-list-header {
      padding: 12px 16px; border-bottom: 1px solid var(--glass-border);
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .email-list-title { font-size: 0.9rem; font-weight: 700; }
    .email-list-count { font-size: 0.75rem; color: var(--text-muted); }
    .email-list-scroll { flex: 1; overflow-y: auto; }
    .email-list-scroll::-webkit-scrollbar { width: 3px; }
    .email-list-scroll::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 99px; }

    .email-item {
      padding: 12px 16px; border-bottom: 1px solid var(--glass-border);
      cursor: pointer; transition: background 0.15s; position: relative;
    }
    .email-item:hover { background: var(--glass-bg); }
    .email-item.active { background: var(--glass-bg-hover); }
    .email-item.unread .email-sender { font-weight: 700; color: var(--text); }
    .email-item.unread .email-subject { font-weight: 600; }
    .email-item-top { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; margin-bottom: 3px; }
    .email-sender { font-size: 0.85rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .email-date { font-size: 0.72rem; color: var(--text-muted); flex-shrink: 0; }
    .email-subject { font-size: 0.82rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
    .email-snippet { font-size: 0.77rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0.75; }
    .unread-dot {
      position: absolute; left: 5px; top: 50%; transform: translateY(-50%);
      width: 6px; height: 6px; border-radius: 50%; background: var(--mail-1);
    }

    /* Loading / empty states */
    .list-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; padding: 40px 20px; color: var(--text-muted); text-align: center;
    }
    .list-state svg { width: 36px; height: 36px; opacity: 0.3; }
    .list-state p { font-size: 0.85rem; }
    .spinner {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2.5px solid var(--glass-border); border-top-color: var(--mail-1);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Email detail ── */
    .email-detail {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }
    .detail-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      color: var(--text-muted); text-align: center; padding: 40px;
    }
    .detail-empty svg { width: 44px; height: 44px; opacity: 0.2; }
    .detail-empty h3 { font-size: 1rem; font-weight: 600; color: var(--text-2, var(--text-muted)); }

    .detail-header {
      padding: 18px 24px 14px; border-bottom: 1px solid var(--glass-border);
      flex-shrink: 0;
    }
    .detail-subject { font-size: 1.1rem; font-weight: 700; margin-bottom: 10px; line-height: 1.3; }
    .detail-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .detail-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, var(--mail-1), var(--mail-2));
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 700; color: white; flex-shrink: 0;
    }
    .detail-from-info { flex: 1; min-width: 0; }
    .detail-from-name { font-size: 0.88rem; font-weight: 600; }
    .detail-from-email { font-size: 0.75rem; color: var(--text-muted); }
    .detail-date { font-size: 0.75rem; color: var(--text-muted); }
    .detail-actions { display: flex; gap: 6px; margin-left: auto; }
    .detail-action-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 12px; border-radius: 8px;
      border: 1px solid var(--glass-border); background: var(--glass-bg);
      font-family: var(--font-main); font-size: 0.8rem; color: var(--text-muted);
      cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    .detail-action-btn:hover { background: var(--glass-bg-hover); color: var(--text); }
    .detail-action-btn svg { width: 13px; height: 13px; }

    .detail-body {
      flex: 1; overflow-y: auto; padding: 20px 24px;
      font-size: 0.9rem; line-height: 1.7; color: var(--text);
    }
    .detail-body::-webkit-scrollbar { width: 4px; }
    .detail-body::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 99px; }
    .detail-body pre { white-space: pre-wrap; font-family: var(--font-main); }

    /* ── Compose modal ── */
    .compose-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(6px);
      display: none; align-items: flex-end; justify-content: flex-end;
      padding: 20px;
    }
    .compose-overlay.open { display: flex; }
    .compose-modal {
      background: var(--bg); border: 1px solid var(--glass-border);
      border-radius: 16px; width: 540px; max-height: 80vh;
      display: flex; flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      animation: composeUp 0.25s cubic-bezier(0.34,1.2,0.64,1) both;
    }
    @keyframes composeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .compose-header {
      padding: 14px 16px; border-bottom: 1px solid var(--glass-border);
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .compose-title { font-size: 0.9rem; font-weight: 700; }
    .compose-header-btns { display: flex; gap: 4px; }
    .compose-hbtn {
      width: 28px; height: 28px; border-radius: 7px; border: none; background: none;
      cursor: pointer; color: var(--text-muted); display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .compose-hbtn:hover { background: var(--glass-bg-hover); color: var(--text); }
    .compose-hbtn svg { width: 13px; height: 13px; }
    .compose-field {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px; border-bottom: 1px solid var(--glass-border);
    }
    .compose-field label { font-size: 0.78rem; color: var(--text-muted); width: 44px; flex-shrink: 0; }
    .compose-field input {
      flex: 1; border: none; background: none; outline: none;
      font-family: var(--font-main); font-size: 0.88rem; color: var(--text);
    }
    .compose-field input::placeholder { color: var(--text-muted); }
    .compose-body {
      flex: 1; overflow-y: auto; padding: 12px 16px;
    }
    #composeBody {
      width: 100%; min-height: 180px; border: none; background: none; outline: none;
      font-family: var(--font-main); font-size: 0.88rem; color: var(--text);
      resize: none; line-height: 1.6;
    }
    #composeBody::placeholder { color: var(--text-muted); }
    .compose-footer {
      padding: 12px 16px; border-top: 1px solid var(--glass-border);
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
    .compose-send-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 18px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, var(--mail-1), var(--mail-2));
      color: white; font-family: var(--font-main); font-size: 0.85rem; font-weight: 600;
      cursor: pointer; box-shadow: 0 2px 10px var(--mail-glow); transition: transform 0.15s;
    }
    .compose-send-btn:hover { transform: translateY(-1px); }
    .compose-send-btn svg { width: 14px; height: 14px; }
    .compose-draft-btn {
      padding: 8px 14px; border-radius: 10px;
      border: 1px solid var(--glass-border); background: var(--glass-bg);
      font-family: var(--font-main); font-size: 0.82rem; color: var(--text-muted);
      cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    .compose-draft-btn:hover { background: var(--glass-bg-hover); color: var(--text); }
    .compose-status { font-size: 0.78rem; color: var(--text-muted); margin-left: auto; }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--text); color: var(--bg); padding: 9px 18px;
      border-radius: 10px; font-size: 0.84rem; font-weight: 500;
      z-index: 500; opacity: 0; transition: opacity 0.25s;
      pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
  <div class="noise"></div>

  <div class="mail-app">
    <!-- Sidebar -->
    <aside class="mail-sidebar">
      <div class="mail-sidebar-top">
        <div class="mail-logo-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>
        <span class="mail-wordmark">Mail</span>
      </div>
      <button class="compose-btn" onclick="openCompose()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Compose
      </button>
      <nav class="mail-nav">
        <button class="nav-item active" onclick="loadFolder('inbox',this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
          Inbox
          <span class="nav-badge" id="unread-badge" style="display:none"></span>
        </button>
        <button class="nav-item" onclick="loadFolder('unread',this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Unread
        </button>
        <button class="nav-item" onclick="loadFolder('starred',this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          Starred
        </button>
        <button class="nav-item" onclick="loadFolder('sent',this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Sent
        </button>
        <button class="nav-item" onclick="loadFolder('drafts',this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Drafts
        </button>
        <button class="nav-item" onclick="loadFolder('spam',this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
          Spam
        </button>
      </nav>
      <div class="mail-sidebar-bottom">
        <div class="mail-user-av" id="userInitial">?</div>
        <div class="mail-user-email" id="userEmail">Loading...</div>
      </div>
    </aside>

    <!-- Main -->
    <div class="mail-main">
      <div class="mail-topbar">
        <div class="mail-search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="mailSearch" placeholder="Search mail…" onkeydown="if(event.key==='Enter')doSearch()"/>
        </div>
        <div class="topbar-spacer"></div>
        <button class="topbar-btn" onclick="refreshFolder()" title="Refresh">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
        <a href="index.html" class="topbar-btn" title="Back to Lumo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </a>
      </div>

      <div class="mail-content">
        <!-- Email list -->
        <div class="email-list">
          <div class="email-list-header">
            <span class="email-list-title" id="folderTitle">Inbox</span>
            <span class="email-list-count" id="emailCount"></span>
          </div>
          <div class="email-list-scroll" id="emailListScroll">
            <div class="list-state"><div class="spinner"></div><p>Loading...</p></div>
          </div>
        </div>

        <!-- Email detail -->
        <div class="email-detail" id="emailDetail">
          <div class="detail-empty">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <h3>Select an email</h3>
            <p style="font-size:0.82rem;color:var(--text-muted)">Choose a message from the list to read it.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Compose modal -->
  <div class="compose-overlay" id="composeOverlay">
    <div class="compose-modal">
      <div class="compose-header">
        <span class="compose-title">New Message</span>
        <div class="compose-header-btns">
          <button class="compose-hbtn" onclick="closeCompose()" title="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
      <div class="compose-field">
        <label>To</label>
        <input type="email" id="composeTo" placeholder="recipient@example.com"/>
      </div>
      <div class="compose-field">
        <label>Subject</label>
        <input type="text" id="composeSubject" placeholder="Subject"/>
      </div>
      <div class="compose-body">
        <textarea id="composeBody" placeholder="Write your message…"></textarea>
      </div>
      <div class="compose-footer">
        <button class="compose-send-btn" onclick="saveDraft()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Save as Draft
        </button>
        <button class="compose-draft-btn" onclick="closeCompose()">Discard</button>
        <span class="compose-status" id="composeStatus"></span>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="config.js"></script>
  <script src="lumo-mail.js"></script>
</body>
</html>
