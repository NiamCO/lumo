<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumo</title>
  <link rel="icon" type="image/png" href="assets/favicon.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital@1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div><div class="orb orb-2"></div>
    <div class="orb orb-3"></div><div class="orb orb-4"></div>
  </div>
  <div class="noise"></div>

  <nav class="top-nav glass-subtle">
    <div class="nav-left"><span class="nav-brand">lumo</span></div>
    <div class="nav-right">
      <a href="news.html" class="nav-link">News</a>
      <button class="nav-link" onclick="window.location.href='settings.html'">Settings</button>
      <button class="apps-btn" id="appsBtn" aria-label="Apps" title="Lumo Apps">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
          <rect x="3" y="3" width="4" height="4" rx="1"/><rect x="10" y="3" width="4" height="4" rx="1"/><rect x="17" y="3" width="4" height="4" rx="1"/>
          <rect x="3" y="10" width="4" height="4" rx="1"/><rect x="10" y="10" width="4" height="4" rx="1"/><rect x="17" y="10" width="4" height="4" rx="1"/>
          <rect x="3" y="17" width="4" height="4" rx="1"/><rect x="10" y="17" width="4" height="4" rx="1"/><rect x="17" y="17" width="4" height="4" rx="1"/>
        </svg>
      </button>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <span class="theme-icon sun">☀️</span><span class="theme-icon moon">🌙</span>
      </button>
    </div>
  </nav>

  <!-- Apps modal -->
  <div class="apps-overlay" id="appsOverlay">
    <div class="apps-modal glass">
      <div class="apps-modal-header">
        <span>Lumo Apps</span>
        <button class="apps-close" id="appsClose">✕</button>
      </div>
      <div class="apps-grid">
        <a href="lode.html" class="app-item"><div class="app-icon-wrap">🖥️</div><span class="app-name">Lode</span></a>
        <a href="maps.html" class="app-item"><div class="app-icon-wrap">🗺️</div><span class="app-name">Maps</span></a>
        <a href="lumo-chat.html" class="app-item"><div class="app-icon-wrap">💬</div><span class="app-name">Chat</span></a>
        <div class="app-item app-soon"><div class="app-icon-wrap">📅</div><span class="app-name">Calendar</span><span class="app-soon-tag">Soon</span></div>
        <div class="app-item app-soon"><div class="app-icon-wrap">📁</div><span class="app-name">Drive</span><span class="app-soon-tag">Soon</span></div>
        <div class="app-item app-soon"><div class="app-icon-wrap">🖼️</div><span class="app-name">Photos</span><span class="app-soon-tag">Soon</span></div>
      </div>
    </div>
  </div>

  <main class="hero">
    <div class="logo-container" id="logoContainer">
      <svg class="logo-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="lumoGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#9ca3af"/><stop offset="50%" stop-color="#6b7280"/><stop offset="100%" stop-color="#4b5563"/>
          </radialGradient>
          <radialGradient id="glowGrad" cx="50%" cy="40%" r="60%">
            <stop offset="0%" stop-color="#f9fafb" stop-opacity="0.9"/><stop offset="100%" stop-color="#9ca3af" stop-opacity="0"/>
          </radialGradient>
          <filter id="glow"><feGaussianBlur stdDeviation="3" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <circle class="logo-ring logo-ring-outer" cx="60" cy="60" r="52" fill="none" stroke="url(#lumoGrad)" stroke-width="1.5" stroke-dasharray="8 4" opacity="0.4"/>
        <circle class="logo-ring logo-ring-mid" cx="60" cy="60" r="40" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
        <circle class="logo-core" cx="60" cy="60" r="28" fill="url(#lumoGrad)" opacity="0.15"/>
        <circle class="logo-glow-circle" cx="60" cy="60" r="22" fill="url(#glowGrad)" filter="url(#glow)"/>
        <text x="60" y="70" text-anchor="middle" font-family="Outfit" font-weight="700" font-size="28" fill="url(#lumoGrad)" filter="url(#glow)">L</text>
        <circle class="sparkle s1" cx="60" cy="12" r="2.5" fill="#9ca3af"/>
        <circle class="sparkle s2" cx="104" cy="38" r="1.8" fill="#6b7280"/>
        <circle class="sparkle s3" cx="104" cy="82" r="2" fill="#4b5563"/>
        <circle class="sparkle s4" cx="60" cy="108" r="2.5" fill="#9ca3af"/>
        <circle class="sparkle s5" cx="16" cy="82" r="1.8" fill="#6b7280"/>
        <circle class="sparkle s6" cx="16" cy="38" r="2" fill="#4b5563"/>
      </svg>
      <h1 class="logo-wordmark">lumo</h1>
      <p class="logo-tagline"><em>just lumo it.</em></p>
    </div>

    <div class="search-container" id="searchContainer">
      <div class="search-glass">
        <div class="search-inner">
          <span class="search-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </span>
          <input type="text" id="searchInput" class="search-input" placeholder="Search anything…" autocomplete="off" spellcheck="false"/>
          <button class="search-clear" id="clearBtn" aria-label="Clear">✕</button>
          <button class="search-submit" id="searchBtn" aria-label="Search">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
            </svg>
          </button>
        </div>
        <div class="suggestions" id="suggestions"></div>
      </div>
      <div class="quick-chips">
        <button class="chip" onclick="doSearch('weather today')">🌤 Weather</button>
        <button class="chip" onclick="doSearch('latest news')">📰 News</button>
        <button class="chip" onclick="doSearch('trending topics')">🔥 Trending</button>
        <button class="chip" onclick="doSearch('AI breakthroughs 2025')">🤖 AI</button>
      </div>
    </div>
  </main>

  <footer class="footer">
    <span>© 2025 Lumo</span><span class="footer-sep">·</span>
    <a href="settings.html">Settings</a><span class="footer-sep">·</span>
    <a href="#">Privacy</a>
  </footer>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
