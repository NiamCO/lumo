<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lode — Coding AI</title>
    <link rel="icon" type="image/png" href="assets/favicon.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Override brand colors for Lode (green/emerald) ── */
    :root {
      --lode-1: #10b981;
      --lode-2: #34d399;
      --lode-3: #059669;
      --lode-glow: rgba(16,185,129,0.22);
      --lode-glow-soft: rgba(52,211,153,0.10);
      --mono: 'JetBrains Mono', monospace;
    }

    body { height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    /* ── App shell ── */
    .lode-app { display: flex; height: 100vh; position: relative; z-index: 10; }

    /* ══════════════════════════════════
       SIDEBAR
    ══════════════════════════════════ */
    .lode-sidebar {
      width: 52px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--glass-border);
      background: var(--glass-bg-strong);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      transition: width 0.25s cubic-bezier(0.4,0,0.2,1);
      overflow: hidden;
      flex-shrink: 0;
      position: relative;
      z-index: 20;
    }
    .lode-sidebar.expanded { width: 260px; }

    /* Rail (always visible) */
    .sidebar-rail {
      width: 52px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0;
      gap: 4px;
      position: absolute;
      left: 0; top: 0; bottom: 0;
      z-index: 2;
    }
    .rail-btn {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); transition: background 0.15s, color 0.15s;
    }
    .rail-btn:hover { background: var(--glass-bg-hover); color: var(--text); }
    .rail-btn.active { color: var(--lode-1); }
    .rail-btn svg { width: 17px; height: 17px; }
    .rail-divider { width: 28px; height: 1px; background: var(--glass-border); margin: 4px 0; }

    /* Expanded panel */
    .sidebar-panel {
      position: absolute;
      left: 52px; top: 0; right: 0; bottom: 0;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .lode-sidebar.expanded .sidebar-panel { opacity: 1; pointer-events: all; }

    .panel-header {
      padding: 12px 12px 8px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--glass-border);
      flex-shrink: 0;
    }
    .panel-title {
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-muted);
    }
    .panel-hbtns { display: flex; gap: 4px; }
    .panel-hbtn {
      width: 26px; height: 26px; border-radius: 7px;
      border: none; background: none; cursor: pointer;
      color: var(--text-muted); display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .panel-hbtn:hover { background: var(--glass-bg-hover); color: var(--text); }
    .panel-hbtn svg { width: 13px; height: 13px; }

    .panel-scroll {
      flex: 1; overflow-y: auto; padding: 6px 8px;
    }
    .panel-scroll::-webkit-scrollbar { width: 3px; }
    .panel-scroll::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 99px; }

    /* Project sections */
    .project-block { margin-bottom: 6px; }
    .project-header {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 6px; border-radius: 8px; cursor: pointer;
      color: var(--text-muted); font-size: 0.78rem; font-weight: 600;
      transition: background 0.15s, color 0.15s; user-select: none;
      position: relative;
    }
    .project-header:hover { background: var(--glass-bg); color: var(--text); }
    .project-header svg { width: 13px; height: 13px; flex-shrink: 0; }
    .project-chevron { margin-left: auto; transition: transform 0.2s; flex-shrink: 0; }
    .project-chevron.open { transform: rotate(90deg); }
    .project-name-input {
      background: none; border: none; outline: none; font-family: var(--font-main);
      font-size: 0.78rem; font-weight: 600; color: var(--text); width: 100%;
      padding: 0; cursor: text;
    }
    .project-name-input:not([readonly]) {
      background: var(--glass-bg); border-radius: 4px; padding: 1px 4px;
    }
    .project-actions {
      display: none; gap: 2px; margin-left: auto; flex-shrink: 0;
    }
    .project-header:hover .project-actions { display: flex; }
    .project-action-btn {
      width: 20px; height: 20px; border-radius: 5px; border: none; background: none;
      cursor: pointer; color: var(--text-muted); display: flex; align-items: center; justify-content: center;
      transition: background 0.12s, color 0.12s;
    }
    .project-action-btn:hover { background: var(--glass-bg-hover); color: var(--text); }
    .project-action-btn svg { width: 11px; height: 11px; }

    .project-chats { padding-left: 18px; display: flex; flex-direction: column; gap: 1px; }

    /* Chat items */
    .chat-item {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 8px; border-radius: 8px; cursor: pointer;
      font-size: 0.8rem; color: var(--text-muted); transition: background 0.15s, color 0.15s;
      position: relative; group: true;
    }
    .chat-item:hover { background: var(--glass-bg); color: var(--text); }
    .chat-item.active { background: var(--glass-bg-hover); color: var(--text); }
    .chat-item.active .chat-item-title { color: var(--lode-1); }
    .chat-item-icon { flex-shrink: 0; opacity: 0.5; }
    .chat-item-icon svg { width: 12px; height: 12px; }
    .chat-item-title {
      flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-size: 0.8rem;
    }
    .chat-item-title-input {
      flex: 1; background: var(--glass-bg); border: none; outline: none;
      font-family: var(--font-main); font-size: 0.8rem; color: var(--text);
      border-radius: 4px; padding: 1px 4px; width: 100%;
    }
    .chat-item-actions {
      display: none; gap: 1px; flex-shrink: 0;
    }
    .chat-item:hover .chat-item-actions { display: flex; }
    .chat-action-btn {
      width: 18px; height: 18px; border-radius: 4px; border: none; background: none;
      cursor: pointer; color: var(--text-muted); display: flex; align-items: center; justify-content: center;
      transition: background 0.12s, color 0.12s;
    }
    .chat-action-btn:hover { background: var(--glass-bg-hover); color: var(--text); }
    .chat-action-btn svg { width: 10px; height: 10px; }

    /* Loose chats (no project) */
    .loose-section-label {
      font-size: 0.67rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-muted);
      padding: 8px 6px 4px; opacity: 0.6;
    }

    /* New project btn */
    .new-project-btn {
      margin: 6px 8px 0; padding: 6px 10px; border-radius: 8px;
      border: 1px dashed var(--glass-border); background: none;
      font-family: var(--font-main); font-size: 0.78rem; color: var(--text-muted);
      cursor: pointer; display: flex; align-items: center; gap: 6px; width: calc(100% - 16px);
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .new-project-btn:hover { border-color: var(--lode-1); color: var(--lode-1); background: var(--lode-glow-soft); }
    .new-project-btn svg { width: 12px; height: 12px; }

    /* Sidebar bottom */
    .sidebar-bottom {
      flex-shrink: 0; padding: 8px; border-top: 1px solid var(--glass-border);
      display: flex; flex-direction: column; gap: 4px;
    }

    /* ══════════════════════════════════
       MAIN AREA
    ══════════════════════════════════ */
    .lode-main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

    /* Top nav */
    .lode-nav {
      height: 52px; flex-shrink: 0;
      display: flex; align-items: center; gap: 10px; padding: 0 16px;
      border-bottom: 1px solid var(--glass-border);
      background: var(--glass-bg-strong);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
    }
    .lode-nav-logo {
      display: flex; align-items: center; gap: 8px; text-decoration: none; margin-right: 4px;
    }
    .lode-logo-mark {
      width: 28px; height: 28px; border-radius: 8px;
      background: linear-gradient(135deg, var(--lode-1), var(--lode-2));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 10px var(--lode-glow);
    }
    .lode-logo-mark svg { width: 16px; height: 16px; color: white; }
    .lode-wordmark {
      font-size: 1.05rem; font-weight: 700; letter-spacing: -0.04em;
      background: linear-gradient(135deg, var(--lode-1), var(--lode-2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .lode-nav-divider { width: 1px; height: 18px; background: var(--glass-border); }
    .lode-chat-label {
      font-size: 0.85rem; color: var(--text-muted); font-weight: 400;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 280px;
    }
    .lode-nav-spacer { flex: 1; }
    .lode-nav-btn {
      width: 32px; height: 32px; border-radius: 9px; border: none;
      background: var(--glass-bg); color: var(--text-muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s; border: 1px solid var(--glass-border);
    }
    .lode-nav-btn:hover { background: var(--glass-bg-hover); color: var(--text); }
    .lode-nav-btn svg { width: 15px; height: 15px; }
    .lode-new-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 9px; border: none;
      background: linear-gradient(135deg, var(--lode-1), var(--lode-2));
      color: white; font-family: var(--font-main); font-size: 0.82rem; font-weight: 600;
      cursor: pointer; box-shadow: 0 2px 10px var(--lode-glow);
      transition: transform 0.15s, opacity 0.15s;
    }
    .lode-new-btn:hover { transform: translateY(-1px); }
    .lode-new-btn svg { width: 13px; height: 13px; }

    /* Messages */
    .lode-messages {
      flex: 1; overflow-y: auto; padding: 24px 0;
      display: flex; flex-direction: column; gap: 0;
    }
    .lode-messages::-webkit-scrollbar { width: 4px; }
    .lode-messages::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 99px; }

    /* Welcome */
    .lode-welcome {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px; text-align: center; gap: 16px;
    }
    .lode-welcome-icon {
      width: 64px; height: 64px; border-radius: 18px;
      background: linear-gradient(135deg, var(--lode-1), var(--lode-2));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 28px var(--lode-glow); margin-bottom: 4px;
    }
    .lode-welcome-icon svg { width: 32px; height: 32px; color: white; }
    .lode-welcome h2 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.04em; }
    .lode-welcome p { font-size: 0.9rem; color: var(--text-muted); max-width: 380px; line-height: 1.65; }
    .lode-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
    .lode-chip {
      padding: 7px 14px; border-radius: 999px;
      border: 1px solid var(--glass-border); background: var(--glass-bg);
      font-family: var(--font-main); font-size: 0.82rem; color: var(--text-muted);
      cursor: pointer; transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .lode-chip:hover { border-color: var(--lode-1); color: var(--lode-1); background: var(--lode-glow-soft); }

    /* Message rows */
    .lode-msg {
      display: flex; gap: 14px; padding: 14px 24px;
      animation: fadeUp 0.18s ease both;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .lode-msg.user { flex-direction: row-reverse; }
    .lode-msg-av {
      width: 30px; height: 30px; border-radius: 9px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .lode-msg.ai .lode-msg-av {
      background: linear-gradient(135deg, var(--lode-1), var(--lode-2));
      box-shadow: 0 2px 8px var(--lode-glow);
    }
    .lode-msg.user .lode-msg-av {
      background: var(--glass-bg-strong); border: 1px solid var(--glass-border);
    }
    .lode-msg-av svg { width: 15px; height: 15px; color: white; }
    .lode-msg.user .lode-msg-av svg { color: var(--text-muted); }
    .lode-msg-body { flex: 1; min-width: 0; max-width: 800px; }
    .lode-msg.user .lode-msg-body { align-items: flex-end; display: flex; flex-direction: column; }
    .lode-msg-bubble {
      font-size: 0.9rem; line-height: 1.65; color: var(--text);
      word-break: break-word;
    }
    .lode-msg.user .lode-msg-bubble {
      background: var(--glass-bg-strong); border: 1px solid var(--glass-border);
      border-radius: 16px 16px 4px 16px; padding: 10px 14px;
      display: inline-block; text-align: left; max-width: 520px;
    }

    /* Code blocks */
    .lode-msg-bubble pre {
      background: #0d1117; border-radius: 10px; padding: 14px 16px;
      overflow-x: auto; margin: 10px 0; border: 1px solid rgba(255,255,255,0.08);
      position: relative;
    }
    .lode-msg-bubble pre code {
      font-family: var(--mono); font-size: 0.83rem; line-height: 1.6;
      color: #e6edf3; background: none; padding: 0; border-radius: 0;
    }
    .lode-msg-bubble code {
      font-family: var(--mono); font-size: 0.85em;
      background: var(--glass-bg-strong); padding: 0.15em 0.4em;
      border-radius: 4px; border: 1px solid var(--glass-border);
    }
    .lode-msg-bubble pre code { border: none; background: none; }
    .copy-code-btn {
      position: absolute; top: 8px; right: 8px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px; padding: 3px 8px; font-family: var(--mono);
      font-size: 0.72rem; color: #8b949e; cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .copy-code-btn:hover { background: rgba(255,255,255,0.14); color: #e6edf3; }

    /* Typing dots */
    .lode-typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
    .lode-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--lode-1);
      animation: lodeBounce 1.2s ease-in-out infinite;
    }
    .lode-dot:nth-child(2) { animation-delay: 0.18s; }
    .lode-dot:nth-child(3) { animation-delay: 0.36s; }
    @keyframes lodeBounce { 0%,80%,100%{transform:translateY(0);opacity:0.4} 40%{transform:translateY(-6px);opacity:1} }

    /* Input area */
    .lode-input-wrap {
      flex-shrink: 0; padding: 12px 24px 18px;
      background: var(--glass-bg-strong); backdrop-filter: var(--glass-blur);
      border-top: 1px solid var(--glass-border);
    }
    .lode-input-glass {
      display: flex; align-items: flex-end; gap: 10px;
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: 16px; padding: 10px 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .lode-input-glass:focus-within {
      border-color: rgba(16,185,129,0.4);
      box-shadow: 0 0 0 3px rgba(16,185,129,0.08);
    }
    #lodeInput {
      flex: 1; background: none; border: none; outline: none;
      font-family: var(--font-main); font-size: 0.9rem; color: var(--text);
      resize: none; max-height: 160px; min-height: 22px; line-height: 1.5;
      caret-color: var(--lode-1);
    }
    #lodeInput::placeholder { color: var(--text-muted); }
    .lode-send {
      width: 36px; height: 36px; border-radius: 10px; border: none; flex-shrink: 0;
      background: linear-gradient(135deg, var(--lode-1), var(--lode-2));
      color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 10px var(--lode-glow); transition: transform 0.15s, opacity 0.2s;
    }
    .lode-send:hover { transform: scale(1.08); }
    .lode-send:disabled { opacity: 0.5; transform: none; cursor: default; }
    .lode-send svg { width: 15px; height: 15px; }
    .lode-input-hint { font-size: 0.72rem; color: var(--text-muted); text-align: center; margin-top: 7px; }
  </style>
</head>
<body>
  <div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
  <div class="noise"></div>

  <div class="lode-app">

    <!-- ═══ SIDEBAR ═══ -->
    <aside class="lode-sidebar" id="lodeSidebar">
      <!-- Rail -->
      <div class="sidebar-rail">
        <button class="rail-btn" id="sidebarToggleBtn" title="Toggle sidebar" onclick="toggleSidebar()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/>
          </svg>
        </button>
        <button class="rail-btn" title="New chat" onclick="startNewChat()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
        <div class="rail-divider"></div>
        <div id="railChatDots" style="display:flex;flex-direction:column;gap:3px;align-items:center;overflow:hidden;flex:1;padding-bottom:8px"></div>
      </div>

      <!-- Expanded panel -->
      <div class="sidebar-panel">
        <div class="panel-header">
          <span class="panel-title">Lode</span>
          <div class="panel-hbtns">
            <button class="panel-hbtn" onclick="startNewChat()" title="New chat">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
            </button>
            <button class="panel-hbtn" onclick="toggleSidebar()" title="Collapse">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="panel-scroll" id="panelScroll"></div>
        <button class="new-project-btn" onclick="createProject()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          New Project
        </button>
        <div style="height:8px"></div>
      </div>
    </aside>

    <!-- ═══ MAIN ═══ -->
    <div class="lode-main">
      <nav class="lode-nav">
        <a href="index.html" class="lode-nav-logo" title="Back to Lumo">
          <div class="lode-logo-mark">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
            </svg>
          </div>
          <span class="lode-wordmark">Lode</span>
        </a>
        <div class="lode-nav-divider"></div>
        <span class="lode-chat-label" id="chatLabel">New conversation</span>
        <div class="lode-nav-spacer"></div>
        <button class="lode-new-btn" onclick="startNewChat()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          New chat
        </button>
        <button class="lode-nav-btn" onclick="toggleTheme()" title="Toggle theme">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
      </nav>

      <div class="lode-messages" id="lodeMessages">
        <div class="lode-welcome" id="lodeWelcome">
          <div class="lode-welcome-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
            </svg>
          </div>
          <h2>Lode</h2>
          <p>Your coding AI. Ask anything about code — debugging, architecture, reviews, explanations, and generation in any language.</p>
