<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lumos AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital@1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .lumos-layout {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      height: 100vh; overflow: hidden;
    }
    .lumos-nav {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.75rem 1.5rem;
      flex-shrink: 0;
    }
    .lumos-nav .nav-logo {
      font-family: var(--font-main); font-weight: 700; font-size: 1.1rem;
      letter-spacing: -0.04em; text-decoration: none;
      background: linear-gradient(135deg, var(--brand-1), var(--brand-2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .lumos-title {
      font-size: 0.95rem; font-weight: 600; color: var(--text);
    }
    .lumos-subtitle {
      font-size: 0.78rem; color: var(--text-muted);
    }
    .lumos-messages {
      flex: 1; overflow-y: auto;
      padding: 1.5rem;
      display: flex; flex-direction: column; gap: 1rem;
    }
    .lumos-messages::-webkit-scrollbar { width: 4px; }
    .lumos-messages::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 99px; }
    .msg {
      display: flex; gap: 0.75rem; animation: fadeUp 0.3s ease both;
      max-width: 820px;
    }
    .msg.user { flex-direction: row-reverse; align-self: flex-end; }
    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; background: var(--glass-bg-strong);
      border: 1px solid var(--glass-border);
    }
    .msg.ai .msg-avatar { background: linear-gradient(135deg, var(--brand-1), var(--brand-2)); color: white; }
    .msg-bubble {
      padding: 0.85rem 1.1rem; border-radius: 18px; max-width: 680px;
      font-size: 0.9rem; line-height: 1.65;
    }
    .msg.user .msg-bubble {
      background: var(--glass-bg-strong); border: 1px solid var(--glass-border);
      border-top-right-radius: 6px;
    }
    .msg.ai .msg-bubble {
      background: linear-gradient(135deg, rgba(107,114,128,0.1), rgba(156,163,175,0.06));
      border: 1px solid rgba(107,114,128,0.18);
      border-top-left-radius: 6px;
    }
    .msg-bubble p { margin: 0 0 0.5rem; }
    .msg-bubble p:last-child { margin: 0; }
    .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 0.25rem 0; }
    .typing-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-muted); animation: typingBounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }
    .lumos-input-area {
      padding: 1rem 1.5rem 1.5rem; flex-shrink: 0;
    }
    .lumos-input-glass {
      display: flex; align-items: flex-end; gap: 0.75rem;
      background: var(--glass-bg-strong); border: 1px solid var(--glass-border);
      backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
      border-radius: 20px; padding: 0.75rem 1rem;
      box-shadow: var(--glass-shadow);
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .lumos-input-glass:focus-within {
      border-color: rgba(107,114,128,0.4);
      box-shadow: var(--glass-shadow), 0 0 0 3px rgba(107,114,128,0.08);
    }
    .lumos-textarea {
      flex: 1; background: none; border: none; outline: none;
      font-family: var(--font-main); font-size: 0.93rem; color: var(--text);
      resize: none; max-height: 140px; min-height: 24px; line-height: 1.5;
      caret-color: var(--brand-1);
    }
    .lumos-textarea::placeholder { color: var(--text-muted); }
    .lumos-send {
      background: linear-gradient(135deg, var(--brand-1), var(--brand-2));
      border: none; border-radius: 12px; width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: white; flex-shrink: 0;
      box-shadow: 0 2px 10px var(--brand-glow);
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
    }
    .lumos-send:hover { transform: scale(1.08); }
    .lumos-send:disabled { opacity: 0.5; cursor: default; transform: none; }
    .welcome-msg {
      text-align: center; padding: 3rem 1rem 1rem;
      color: var(--text-muted); flex: 1; display: flex;
      flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .welcome-msg .welcome-icon { font-size: 3rem; margin-bottom: 0.5rem; }
    .welcome-msg h2 { font-size: 1.3rem; font-weight: 700; color: var(--text); }
    .welcome-msg p { font-size: 0.9rem; max-width: 380px; line-height: 1.6; }
    .starter-chips { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; margin-top: 1rem; }
    .starter-chip {
      background: var(--glass-bg-strong); border: 1px solid var(--glass-border);
      border-radius: 999px; padding: 0.45rem 1rem;
      font-size: 0.82rem; color: var(--text-muted); cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      font-family: var(--font-main);
    }
    .starter-chip:hover { background: var(--glass-bg-hover); color: var(--text); border-color: rgba(107,114,128,0.3); }
  </style>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
  </div>
  <div class="noise"></div>

  <div class="lumos-layout">
    <nav class="lumos-nav glass-subtle">
      <a href="index.html" class="results-home-btn" title="Home">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </a>
      <a href="index.html" class="nav-logo">lumo</a>
      <div style="width:1px;height:20px;background:var(--glass-border);"></div>
      <div>
        <div class="lumos-title">🤖 Lumos AI</div>
        <div class="lumos-subtitle">Powered by Mistral</div>
      </div>
      <div style="margin-left:auto;display:flex;gap:0.5rem;">
        <button class="theme-toggle" id="themeToggle">
          <span class="theme-icon sun">☀️</span><span class="theme-icon moon">🌙</span>
        </button>
      </div>
    </nav>

    <div class="lumos-messages" id="messages">
      <div class="welcome-msg" id="welcomeMsg">
        <div class="welcome-icon">🤖</div>
        <h2>Lumos AI</h2>
        <p>Your AI assistant powered by Mistral. Ask me anything — I can help with research, writing, coding, brainstorming, and more.</p>
        <div class="starter-chips">
          <button class="starter-chip" onclick="sendStarter('What can you help me with?')">What can you do?</button>
          <button class="starter-chip" onclick="sendStarter('Write me a short poem about the internet')">Write a poem</button>
          <button class="starter-chip" onclick="sendStarter('Explain quantum computing simply')">Explain quantum computing</button>
          <button class="starter-chip" onclick="sendStarter('Help me brainstorm ideas for a project')">Brainstorm ideas</button>
        </div>
      </div>
    </div>

    <div class="lumos-input-area">
      <div class="lumos-input-glass">
        <textarea id="lumosInput" class="lumos-textarea" placeholder="Message Lumos AI…" rows="1"></textarea>
        <button id="lumosSend" class="lumos-send" aria-label="Send">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script src="lumos-ai.js"></script>
</body>
</html>
