<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lumos AI</title>
  <link rel="icon" type="image/png" href="assets/favicon.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital@1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
  </div>
  <div class="noise"></div>

  <div class="lumos-app">

    <!-- History Sidebar -->
    <aside class="history-sidebar glass-subtle" id="historySidebar">

      <!-- Collapsed rail -->
      <div class="history-rail">
        <button class="history-expand-btn" id="historyExpandBtn" title="Open history">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/>
          </svg>
        </button>
        <button class="history-new-btn-rail" id="newChatBtnRail" title="New chat">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
        <div class="history-rail-chats" id="historyRailChats"></div>
      </div>

      <!-- Expanded panel -->
      <div class="history-panel" id="historyPanel">
        <div class="history-panel-header">
          <span class="history-panel-title">Chats</span>
          <div style="display:flex;gap:0.35rem;">
            <button class="history-icon-btn" id="newChatBtnPanel" title="New chat">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
            </button>
            <button class="history-icon-btn" id="historyCollapseBtn" title="Collapse">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="history-list" id="historyList"></div>
      </div>

    </aside>

    <!-- Main chat area -->
    <div class="lumos-main">

      <nav class="lumos-nav glass-subtle">
        <a href="index.html" class="results-home-btn" title="Home">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </a>
        <a href="index.html" class="nav-logo">lumo</a>
        <div style="width:1px;height:20px;background:var(--glass-border);"></div>
        <div>
          <div class="lumos-title">🤖 Lumos AI</div>
          <div class="lumos-subtitle" id="currentChatLabel">New conversation</div>
        </div>
        <div style="margin-left:auto;display:flex;gap:0.5rem;align-items:center;">
          <button class="history-icon-btn" id="newChatBtnNav" title="New chat">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
          <button class="theme-toggle" id="themeToggle">
            <span class="theme-icon sun">☀️</span><span class="theme-icon moon">🌙</span>
          </button>
        </div>
      </nav>

      <div class="lumos-messages" id="messages">
        <div class="welcome-msg" id="welcomeMsg">
          <div class="welcome-icon">🤖</div>
          <h2>Lumos AI</h2>
          <p>Your AI assistant powered by Mistral. Ask me anything — research, writing, coding, brainstorming, and more.</p>
          <div class="starter-chips">
            <button class="starter-chip" onclick="sendStarter('What can you help me with?')">What can you do?</button>
            <button class="starter-chip" onclick="sendStarter('Write me a short poem about the internet')">Write a poem</button>
            <button class="starter-chip" onclick="sendStarter('Explain quantum computing simply')">Explain quantum computing</button>
            <button class="starter-chip" onclick="sendStarter('Help me brainstorm app ideas')">Brainstorm ideas</button>
          </div>
        </div>
      </div>

      <div class="lumos-input-area">
        <div class="lumos-input-glass">
          <textarea id="lumosInput" class="lumos-textarea" placeholder="Message Lumos AI…" rows="1"></textarea>
          <button id="lumosSend" class="lumos-send" aria-label="Send">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
            </svg>
          </button>
        </div>
      </div>

    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script src="lumos-ai.js"></script>
</body>
</html>
